<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdApp</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <div>
            <h1>Id App</h1>
        </div>
        

      
      <div id="level_div">
        <progress id="level" value="1" max="5"> 32% </progress>
        <!-- <h4>Level:&nbsp; </h4><output id="level"> 1</output> -->
      </div>
      <div>
        <h4>Score:&nbsp;</h4><output id="score">0</output>
      </div>
      
    </header>
    <main>
       <form onsubmit="check(event)">
            <p>AI or Real?</p>
            <input type="text" id="userAnswer" placeholder="Type your answer here" required>
            <button type="submit">Submit </button>
        </form>
         <video id="videoPlayer" width="640" height="360" controls>

    </main>
</body>
</html>
